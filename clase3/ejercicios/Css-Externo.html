<!DOCTYPE html>
<!-- Indica al navegador que el documento usa HTML5 -->

<html lang="es">
<!-- Define el idioma de la página -->

<head>

    <meta charset="UTF-8">
    <!-- Permite usar caracteres especiales como ñ, á, é -->

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Hace que la página se adapte correctamente a móviles -->

    <title>Primeros pasos CSS (externo)</title>
    <!-- Título que aparece en la pestaña del navegador -->

    <link rel="stylesheet" href="style.css">
    <!-- Conecta este HTML con el archivo CSS externo -->

</head>

<body>

    <h1>Título</h1>
    <!-- Título principal -->

    <h2 id="subtitulo1">Subtitulo</h2>
    <!-- Subtítulo con un ID para poder aplicarle estilos específicos -->

    <p>Primer párrafo</p>
    <!-- Primer párrafo -->

    <p>Segundo párrafo</p>
    <!-- Segundo párrafo -->

    <a href="https://www.wikipedia.org">Este es un enlace a Wikipedia</a>
    <!-- Enlace a una página externa -->

    <div>

        <p>
            Este párrafo esta como hijo del div
        </p>

        <section>
            <p>Este párrafo esta dentro de una seccion
                que esta dentro de un div
            </p>
        </section>
    </div>

</body>

</html>
