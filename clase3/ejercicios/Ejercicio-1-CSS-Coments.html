<!DOCTYPE html>
<!-- Indica al navegador que el documento usa HTML5 -->

<html lang="es">
<!-- Elemento raíz de la página. lang="es" indica que el idioma es español -->

<head>
    <!-- La sección head contiene configuraciones del documento -->

    <meta charset="UTF-8">
    <!-- Permite usar caracteres especiales como ñ, á, é correctamente -->

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Hace que la página se adapte correctamente a dispositivos móviles -->

    <title>Primer paso en CSS</title>
    <!-- Título que aparece en la pestaña del navegador -->

    <style>
        p {
            /* Estilos aplicados a todos los párrafos <p> */

            font-family: Verdana;
            /* Cambia la fuente del texto a Verdana */
            color: magenta;
            /* Cambia el color del texto a magenta */
            font-size: medium;
            /* Define el tamaño del texto como tamaño medio */
            padding: 10px;
            border-radius: 18px;
            background-color: rgb(209, 244, 253);
        }

        .special {
            /* Clase llamada "special"
               Se aplicará a cualquier elemento que tenga class="special" */

            font-weight: bold;
            /* Hace que el texto aparezca en negrita */

            background-color: yellow;
            /* Añade un color de fondo amarillo al elemento */

        }
    </style>
</head>

<body>
    <!-- Todo lo que esté dentro del body es contenido visible en la página -->

    <h1>Primera página de Noa 💖</h1>
    <!-- Título principal de la página -->

    <h1 style="color: red;">Primera página de html 🌸</h1>
    <!-- Otro título h1 con CSS en línea que cambia el color a rojo -->

    <h2 style="color: rebeccapurple;">Segunda página de html 🌺</h2>
    <!-- Subtítulo h2 con color morado usando CSS en línea -->

    <p>Primer párrafo 💖</p>
    <!-- Primer párrafo. Se le aplican los estilos definidos para "p" en el CSS -->

    <p>Segundo párrafo 🦄</p>
    <!-- Segundo párrafo con los mismos estilos -->

    <p>Tercer párrafo 👀</p>
    <!-- Tercer párrafo -->

    <p class="special">Un párrafo especial</p>
    <!-- Este párrafo usa la clase "special"
         por lo que aparecerá en negrita y con fondo amarillo -->

</body>

<!--
html
 ├── head  (Configuración del cerebro) 
 └── body  (Lo que ve el usuario)
       ├── header
       ├── nav
       ├── main
       │     ├── section
       │     └── article
       └── footer            
-->

</html>
