<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Primer paso en CSS</title>

    <style>
        p {
            font-family: Verdana;
            color: magenta;

            font-weight: bold;
            background-color: yellow;
        }

</head>

<body>

    <h1>Primera página de Noa 💖</h1>

    <h1 style="color: red;">Primera página de html 🌸</h1>

    <h2 style="color: rebeccapurple;">Segunda página de html 🌺</h2>

    <p>Primer párrafo 💖</p>

    <p>Segundo párrafo 🦄</p>

    <p>Tercer párrafo 👀</p>

    <p class="special">Un párrafo especial</p>

</body>

</html>
