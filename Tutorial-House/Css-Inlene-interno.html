<!DOCTYPE html>
<!-- Indica al navegador que el documento es HTML5 -->

<html lang="es">
<!-- Elemento principal de la página y define el idioma -->

<head>
    <!-- El head es el "cerebro" de la página.
         Aquí se ponen configuraciones, no contenido visible -->

    <meta charset="UTF-8">
    <!-- Permite usar caracteres especiales como ñ, á, é -->

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Hace que la página se adapte bien a móviles y tablets -->

    <title>Primeros pasos CSS (externo)</title>
    <!-- Título que aparece en la pestaña del navegador -->

    <link rel="stylesheet" href="style.css">
    <!-- Conecta este archivo HTML con el archivo CSS externo
         El navegador buscará el archivo llamado style.css
         y aplicará esos estilos a la página -->

</head>

<body>
    <!-- Todo lo que esté dentro del body es lo que verá el usuario -->

    <h1>Página de Noa 🌺</h1>
    <!-- Título principal de la página -->

    <p>Primer párrafo 💕</p>
    <!-- Primer párrafo de texto -->

    <p>Segundo párrafo 💖</p>
    <!-- Segundo párrafo -->

</body>

</html>
