<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>La casa de los niños HTML</title>

<style>

body{
    background-color:#1e1e2f;
    color:white;
    font-family:Arial;
    padding:30px;
}

p{
    background:#2f2f44;
    padding:12px;
    border-radius:10px;
    margin:10px;
}

div > p{
    color:#00ff9d;
    font-weight:bold;
}

.especial{
    background:#ff66de;
    color:black;
}

div p{
    font-style:italic;
}

div{
    border:3px solid #4aa3ff;
    padding:20px;
    border-radius:15px;
    margin-top:20px;
}

section{
    border:2px dashed #ff7aa2;
    padding:15px;
    border-radius:10px;
    margin-top:15px;
}

h1{
    color:#ff7aa2;
}

</style>

</head>

<body>

<h1>🏠 La casa de los niños HTML</h1>

<p>🧒 Niño que vive fuera de la casa</p>
<p>👧 Niña que vive fuera de la casa</p>

<div>

<p>👧 Niña que está en la sala de la casa</p>

<p class="especial">👧 Niña especial con camiseta rosa</p>

<section>

<p>🧒 Niño que está en una habitación dentro de la casa</p>

</section>

</div>

</body>

</html>
