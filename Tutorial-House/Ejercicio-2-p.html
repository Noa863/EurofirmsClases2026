<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Ejercicio selectores</title>
</head>
<style>
    p {
        color: magenta;
    }

    div>p {
        color: green;
    }

    .especial {
        background-color: yellow;
    }

    div p {
        font-style: italic;
    }
</style>

<body>

    <p>Primer párrafo fuera del div 🌺</p>
    <p>Segundo párrafo fuera del div 🌸</p>
    <!-- Los p fuera del div → magenta -->

    <div>
        <p>Párrafo dentro del div 🏵️</p>
        <p class="especial">Párrafo dentro del div con clase 💕</p>
        <!-- Hijos directos del div -->

        <section>
            <p>Párrafo dentro de section que está dentro del div 💕</p>
        </section>
        <!-- El p con clase fondo amarillo y el p con clase fondo amarillo 
             Los p dentro del div (incluso el del section → cursiva) -->
    </div>

<!-- 
Resuemn: Qué pasará

Los p fuera del div → magenta
Los p hijos directos del div → verde
El p con clase → fondo amarillo
Los p dentro del div (incluido el de section) → cursiva

Qué se está practicando aquí

Este ejercicio sirve para entender:

- selectores de etiqueta
- selectores de clase
- hijo directo >
- descendiente div p

div (mamá)
│
├── p (hijo)
├── p.especial (otro hijo)
│
└── section (otro hijo)
      │
      └── p (nieto)

Ejemplo como si fuera una casa:

Casa (div)

Sala
 └── niño (p)

Cocina
 └── niño (p)

Habitación (section)
 └── niño (p)

-->

</body>

</html>
