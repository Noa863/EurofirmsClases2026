<!DOCTYPE html>
<!-- 
DOCTYPE indica al navegador que este documento usa HTML5.
Es importante porque hace que el navegador interprete correctamente el código.
-->

<html lang="es">
<!-- 
La etiqueta <html> es la raíz del documento.
lang="es" indica que el idioma principal de la página es español.
Esto ayuda a buscadores (SEO) y lectores de pantalla.
-->

<head>
  <!-- 
  El <head> contiene información sobre la página.
  Esta información NO se muestra en la página web.
  Aquí se colocan metadatos, enlaces a CSS, scripts, etc.
  -->

  <meta name="description" content="Descripción" />
  <!-- 
  Esta meta etiqueta sirve para describir la página.
  Google puede mostrar este texto en los resultados de búsqueda.
  -->

  <meta charset="utf-8">
  <!-- 
  Define la codificación de caracteres.
  UTF-8 permite usar acentos, ñ, emojis y caracteres especiales.
  -->

  <title>Título</title>
  <!-- 
  Este título aparece en la pestaña del navegador.
  -->
</head>

<body>
  <!-- 
  El <body> contiene todo el contenido visible de la página.
  Todo lo que pongas aquí aparecerá en el navegador.
  -->

  <p>Hello Word</p>
  <!-- 
  <p> significa "paragraph" (párrafo).
  Sirve para escribir bloques de texto.
  -->

  <p>Esta prueba funciona perfectamente!</p>

  <h1>Titulo h1</h1>
  <!-- 
  <h1> es el título principal de la página.
  Es el más importante en HTML.
  -->

  <h2>Titulo h2</h2>
  <!-- 
  <h2> es un subtítulo o sección.
  -->

  <h6>Titulo h3</h6>
  <!-- 
  HTML tiene títulos desde h1 hasta h6.
  h1 es el más grande/importante.
  h6 es el más pequeño.
  -->

  <!-- Este es un comentario -->
  <!-- 
  Los comentarios sirven para explicar el código.
  No se muestran en la página web.
  -->

  <!-- Colocar el Codigo - Shift + Alt + F -->
  <!-- 
  Este atajo en Visual Studio Code ordena automáticamente el código.
  -->

  <!-- 🖱 Otra forma con el ratón:
  Click derecho en el archivo → Format Document
  -->

  <!-- HTML es un lenguaje de marcado -->
  <!-- 
  HTML no es un lenguaje de programación.
  Es un lenguaje de marcado que sirve para estructurar contenido.
  -->

  <!-- <br> salta una linea -->
  <!-- 
  La etiqueta <br> crea un salto de línea dentro del texto.
  -->

  <span>Este es un spam</span>
  <span>Este es otro spam</span>

  <!-- 
  <span> se usa para marcar texto dentro de una línea.
   Para qué se usa <span> Se usa para marcar una parte del texto para poder:
   darle color, cambiar tamaño aplicar CSS, manipularlo con JavaScript
   -->

<!--   
<p>Mi nombre es <span>Noa</span></p>

</> CSS
span{
  color:red;
}

Resultado: Mi nombre es Noa con Noa en rojo.
-->

<p>
    Mi Nombre es <spam>Noa Antonio Garcia</spam>, y estoy feliz. <br>

    <!-- 
    <br> crea un salto de línea.
    -->

    Aqui empiez una nueva linea.
    Aqui No empieza otra linea.

    <hr>

    <!-- 
    <hr> crea una línea horizontal que separa contenido.
    -->

    Todo
    este
    texto
    apare
    en 
    una
    única
    linea

    <!-- 
    HTML ignora saltos de línea y espacios múltiples en el código.
    Todo esto aparecerá como una sola línea en el navegador.
    -->

  </p>

</body>

</html>
