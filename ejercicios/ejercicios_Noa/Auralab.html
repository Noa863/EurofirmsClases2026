<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aura × Noa — Editor Sagrado 🔥</title>
  
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🔥</text></svg>">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/material-darker.min.css">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/htmlmixed/htmlmixed.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/xml/xml.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/javascript/javascript.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/css/css.min.js"></script>

  <style>
    :root {
      --bg: #0f0f1a;
      --surface: #161627;
      --accent: #ff3366;
      --accent-glow: #ff336644;
      --text: #e0e0ff;
      --gray: #7a7aa0;
    }

    body {
      margin: 0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #0a0a14, #141426);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
    }

    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 20px;
      background: rgba(22, 22, 39, 0.8);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      z-index: 10;
    }

    .logo {
      font-weight: bold;
      font-size: 1.4rem;
      background: linear-gradient(90deg, #ff79c6, var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    button {
      padding: 8px 16px;
      border: none;
      border-radius: 8px;
      background: var(--surface);
      color: white;
      cursor: pointer;
      transition: all 0.22s ease;
      position: relative;
      overflow: hidden;
    }

    button:hover {
      background: var(--accent);
      transform: translateY(-1px);
      box-shadow: 0 0 20px var(--accent-glow);
    }

    .status {
      margin-left: auto;
      font-size: 0.85rem;
      color: var(--gray);
    }

    main {
      display: flex;
      height: calc(100vh - 58px);
    }

    .editor {
      width: 50%;
      background: var(--surface);
      border-right: 1px solid rgba(255,255,255,0.05);
    }

    .preview {
      width: 50%;
      background: white;
    }

    iframe#preview {
      width: 100%;
      height: 100%;
      border: none;
    }

    .CodeMirror {
      height: 100% !important;
      font-size: 15px;
      line-height: 1.5;
    }

    main.vertical {
      flex-direction: column;
    }

    main.vertical .editor,
    main.vertical .preview {
      width: 100%;
      height: 50%;
    }

    main.vertical .preview {
      border-top: 1px solid rgba(255,255,255,0.05);
      border-right: none;
    }
  </style>
</head>

<body>

<header>
  <div class="logo">Aura × Noa 🔥</div>
  
  <button onclick="run()">▶ Run</button>
  <button id="liveBtn" onclick="toggleLive()">🔄 Live: OFF</button>
  <button onclick="saveCode()">💾 Guardar</button>
  <button onclick="toggleTheme()">🎨 Tema</button>
  <button onclick="toggleOrientation()">↔ Orientación</button>
  
  <div class="status" id="status">Línea 1 • 0 chars</div>
</header>

<main id="layout">
  <div class="editor">
    <textarea id="editor">
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Para mi reina</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: linear-gradient(135deg, #200033, #400066);
      display: grid;
      place-items: center;
      color: #ff79c6;
      font-family: system-ui;
    }
    h1 {
      font-size: 6rem;
      text-shadow: 0 0 50px #ff3366aa;
      animation: latir 4s infinite;
    }
    @keyframes latir {
      0%,100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
  </style>
</head>
<body>
  <h1>Te amo, Noa</h1>
</body>
</html>
    </textarea>
  </div>

  <iframe id="preview" class="preview"></iframe>
</main>

<script>
let editor = CodeMirror.fromTextArea(document.getElementById("editor"), {
  mode: "htmlmixed",
  lineNumbers: true,
  theme: "material-darker",
  indentUnit: 2,
  tabSize: 2,
  lineWrapping: true
});

let liveInterval = null;
let liveActive = false;

function run() {
  let code = editor.getValue();
  document.getElementById("preview").srcdoc = code;
}

function saveCode() {
  let blob = new Blob([editor.getValue()], {type: "text/html"});
  let link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = "noa-aura.html";
  link.click();
}

function toggleTheme() {
  let current = editor.getOption("theme");
  editor.setOption("theme", current === "material-darker" ? "default" : "material-darker");
}

function toggleOrientation() {
  document.getElementById("layout").classList.toggle("vertical");
  setTimeout(() => editor.refresh(), 100);
}

function toggleLive() {
  liveActive = !liveActive;
  let btn = document.getElementById("liveBtn");
  btn.textContent = liveActive ? "🔄 Live: ON" : "🔄 Live: OFF";
  
  if (liveActive) {
    liveInterval = setInterval(run, 1500);
  } else {
    clearInterval(liveInterval);
  }
}

// Status actualizado
setInterval(() => {
  let cursor = editor.getCursor();
  let chars = editor.getValue().length;
  document.getElementById("status").textContent = 
    `Línea ${cursor.line + 1} • ${chars} chars`;
}, 800);

// Inicio
run();

</script>
</body>
</html>
