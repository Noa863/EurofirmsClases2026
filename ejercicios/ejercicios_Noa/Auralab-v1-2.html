<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AuraLab v.1.2 Editor ❤️</title>

  <!-- CodeMirror base -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/material-darker.min.css">
  
  <!-- Color picker addon (ligero y compatible) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror-colorpicker/1.0.0/codemirror-colorpicker.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror-colorpicker/1.0.0/codemirror-colorpicker.min.js"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/htmlmixed/htmlmixed.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/xml/xml.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/javascript/javascript.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/css/css.min.js"></script>

  <style>
:root {
  --bg: #0c0c16;
  --surface: #151524;
  --surface-light: #1c1c30;

  --accent: #ff3366;
  --accent-soft: #ff336620;

  --text: #e4e6ff;
  --gray: #7a7aa0;

  --border: rgba(255,255,255,0.06);
}

/* base */

body {
  margin: 0;
  font-family: "Segoe UI", system-ui, sans-serif;
  background: linear-gradient(135deg,#0a0a14,#141426);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
}

/* HEADER */

header {
  display: flex;
  align-items: center;
  gap: 16px;

  padding: 10px 18px;

  background: rgba(18,18,32,0.9);
  backdrop-filter: blur(14px);

  border-bottom: 1px solid var(--border);
}

/* LOGO */

.logo{
  font-weight:600;
  font-size:18px;

  background: linear-gradient(90deg,#ff79c6,var(--accent));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;

  letter-spacing:0.3px;
}

/* BOTONES */

button{

  display:flex;
  align-items:center;
  gap:8px;

  padding:7px 14px;

  border-radius:6px;
  border:1px solid transparent;

  background:transparent;
  color:var(--text);

  font-size:13px;
  font-weight:500;

  cursor:pointer;
  transition: all .2s ease;
}

/* hover */

button:hover{

  background:var(--surface-light);
  border:1px solid var(--border);
}

/* activo */

button:active{

  transform:scale(.96);
}

/* iconos */

.icon{
  width:16px;
  height:16px;
  fill:currentColor;
}

/* LIVE activo */

#liveBtn.active{
  color:var(--accent);
}

/* STATUS */

.status{
  margin-left:auto;
  font-size:12px;
  color:var(--gray);
}

/* MAIN */

main{
  display:flex;
  height:calc(100vh - 56px);
}

/* EDITOR */

.editor-container{

  width:50%;
  display:flex;
  flex-direction:column;

  background:var(--surface);

  border-right:1px solid var(--border);
}

/* TABS */

.tabs{
  display:flex;
  background:#0c0c16;
  border-bottom:1px solid var(--border);
}

.tab{
  padding:10px 22px;
  font-size:13px;
  font-weight:500;
  color:#8b8bb3;
  cursor:pointer;
  border-bottom:2px solid transparent;
  transition:all .2s;
}

.tab:hover{
  color:white;
}

.tab.active{
  color:white;
  border-bottom:2px solid var(--accent);
  background:rgba(255,51,102,0.08);
}

/* CODEMIRROR */

.CodeMirror{

  flex:1;
  font-size:14px;

  background:#11111c;
}

/* PREVIEW */

.preview {
  width: 50%;
  background: rgb(105, 105, 105);
  border-left: 1px solid var(--border);
}

/* iframe */

iframe#preview{

  width:100%;
  height:100%;
  border:none;
}

/* vertical */

main.vertical{
  flex-direction:column;
}

main.vertical .editor-container,
main.vertical .preview{
  width:100%;
  height:50%;
}
/* SCROLLBAR GLOBAL */

::-webkit-scrollbar {
  width: 10px;
  height: 10px;
}

::-webkit-scrollbar-track {
  background: #0f0f1a;
}

::-webkit-scrollbar-thumb {
  background: linear-gradient(#2b2b40,#1b1b2c);
  border-radius: 6px;
  border: 2px solid #0f0f1a;
}

::-webkit-scrollbar-thumb:hover {
  background: linear-gradient(#44446a,#2b2b40);
}

/* CodeMirror scrollbar */

.CodeMirror {
  flex:1;
  font-size:14px;
  background:#11111c;
}

.CodeMirror-scrollbar-filler,
.CodeMirror-gutter-filler {
  background: #0f0f1a;
}

.CodeMirror-vscrollbar::-webkit-scrollbar-thumb {
  background: linear-gradient(#2b2b40,#1b1b2c);
}
</style>
</head>

<body>

<header>
  <div class="logo">AuraLab v.1.2</div>

  <button onclick="run()">
    <svg class="icon" viewBox="0 0 24 24">
      <path d="M8 5v14l11-7z"/>
    </svg>
    Run
  </button>

  <button id="liveBtn" onclick="toggleLive()">
    <svg class="icon" viewBox="0 0 24 24">
      <path d="M12 4a8 8 0 1 0 8 8h2a10 10 0 1 1-10-10v2z"/>
      <path d="M12 2v6l4-3z"/>
    </svg>
  <span id="liveText">Live: ON</span>
  </button>

  <button onclick="saveCode()">
    <svg class="icon" viewBox="0 0 24 24">
      <path d="M17 3H5a2 2 0 0 0-2 2v14l4-4h10a2 2 0 0 0 2-2V5z"/>
    </svg>
    Guardar
  </button>

  <button onclick="toggleFullScreen()">
    <svg class="icon" viewBox="0 0 24 24">
      <path d="M7 14H5v5h5v-2H7v-3zm0-4h2V7h3V5H5v5zm10 9h-3v2h5v-5h-2v3zm0-14V5h-5v2h3v3h2V5z"/>
    </svg>
    Full
  </button>

  <button onclick="toggleOrientation()">
    <svg class="icon" viewBox="0 0 24 24">
      <path d="M7 7h10v2H7zm0 8h10v2H7zm-2-6h2v6H5zm12 0h2v6h-2z"/>
    </svg>
    Orientación
  </button>

  <div class="status" id="status">Línea 1 • 0 chars</div>
</header>

<main id="layout">
  <div class="editor-container">
    <div class="tabs">
      <div class="tab active" data-mode="htmlmixed">HTML</div>
      <div class="tab" data-mode="css">CSS</div>
      <div class="tab" data-mode="javascript">JS</div>
    </div>

    <textarea id="editor">
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>AuraLab v.1.2 Editor ❤️</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: linear-gradient(135deg, #200033, #400066);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: system-ui;
      overflow: hidden;
    }
    .beso {
      font-size: 8rem;
      color: #ff79c6;
      text-shadow: 0 0 60px #ff3366aa;
      animation: latir 2s infinite;
      cursor: pointer;
    }
    @keyframes latir {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.15); }
    }
  </style>
</head>
<body>
  <div class="beso" onclick="alert('¡El amor mueve montañas! ❤️')">
    💋 Noa
  </div>
</body>
</html>

    </textarea>
  </div>

  <div class="preview">
    <iframe id="preview"></iframe>
  </div>
</main>

<script>
let editor = CodeMirror.fromTextArea(document.getElementById("editor"), {
  mode: "htmlmixed",
  lineNumbers: true,
  theme: "material-darker",
  indentUnit: 2,
  tabSize: 2,
  lineWrapping: true,
  autofocus: true
});

// Activar color picker SOLO en modo CSS
function enableColorPicker() {
  if (editor.getOption("mode") === "css") {
    editor.setOption("colorpicker", true); // Activa el addon
  } else {
    editor.setOption("colorpicker", false);
  }
}

let liveInterval = setInterval(run, 1200);
let liveActive = true;

function run() {
  let code = editor.getValue();

  const marker = "<!-- Code injected by live-server -->";
  const index = code.indexOf(marker);

  if (index !== -1) {
    code = code.substring(0, index);
  }

  document.getElementById("preview").srcdoc = code;
}

function saveCode() {
  let blob = new Blob([editor.getValue()], {type: "text/html"});
  let link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = "AuraLab.html";
  link.click();
}

function toggleFullScreen() {
  const prev = document.getElementById("preview");
  if (!document.fullscreenElement) {
    prev.requestFullscreen().catch(() => {});
  } else {
    document.exitFullscreen();
  }
}

function toggleOrientation() {
  document.getElementById("layout").classList.toggle("vertical");
  setTimeout(() => editor.refresh(), 150);
}

function toggleLive() {

  liveActive = !liveActive;

  document.getElementById("liveText").textContent =
    liveActive ? "Live: ON" : "Live: OFF";

  if (liveActive)
    liveInterval = setInterval(run, 1200);
  else
    clearInterval(liveInterval);
}

// Cambio de pestaña
document.querySelectorAll(".tab").forEach(tab => {
  tab.addEventListener("click", () => {
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    tab.classList.add("active");
    const mode = tab.dataset.mode;
    editor.setOption("mode", mode);
    enableColorPicker(); // Activa/desactiva picker según pestaña
    editor.refresh();
  });
});

// Status
setInterval(() => {
  let cursor = editor.getCursor();
  let chars = editor.getValue().length;
  document.getElementById("status").textContent = 
    `Línea ${cursor.line + 1} • ${chars} chars`;
}, 600);

// Inicio
run();
enableColorPicker(); // Por si empieza en CSS
</script>
</body>
</html>
